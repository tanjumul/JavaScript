<!doctype html>
<html>
  <head>
    <title>Rock-paper-scissors-cleaner</title>
  </head>
  <body>
    <button class="rock-btn" onclick="playGame('Rock')">Rock</button>

    <button class="paper-btn" onclick="playGame('Paper')">Paper</button>

    <button class="scissors-btn" onclick="playGame('Scissor')">Scissors</button>

    <p class="js-result"></p>
    <p class="js-move"></p>
    <p class="js-score"></p>

    <button
      class="reset-scr"
      onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScoreElement();
      "
    >
      Reset Score
    </button>




<p>Amazon Shipping Calculator</p>
<p>Orders under $40 = +$10 shipping.</p>
<p>Orders over $40 = FREE shipping.</p>

<input type="text" class="js-input" placeholder="Cost of Order ?" onkeydown="

handlecostKeyDown(event);

"> <button onclick="
calculate();">Calculate</button>


<p class="js-input-results"></p>


    <script>
  //       String(25)
  // console.log('25'-5);
  // console.log('25'+ 5);
  // window.document
  window.console.log('Tanjumul using the whole window of the browser'); 
  
  function handlecostKeyDown(event){ 

  if(event.key === 'Enter'){ 
    calculate();   
  }

  }

function calculate(){

const inputElement = document.querySelector('.js-input');

let costs = Number(inputElement.value); 

let finalCosting; 

finalCosting = (costs > 40 ) ? costs : costs + 10; 
document.querySelector('.js-input-results').innerHTML = `$${finalCosting}`;

}
// if(costs > 40){ 
//   finalCosting = costs; 

// }else{ 
//  finalCosting=costs+10; 
// }
// document.querySelector('.js-input-results').innerHTML = `$${finalCosting}`;
// console.log(finalCosting)

// }


      let score = JSON.parse(localStorage.getItem("score")) || {
        wins: 0,
        losses: 0,
        ties: 0,
      };

      updateScoreElement();

      function pickComputerMove() {
        let computerMove = "";
        const randomNumber = Math.random();
        if (randomNumber > 0 && randomNumber <= 1 / 3) {
          computerMove = "Rock";
        } else if (randomNumber >= 1 / 3 && randomNumber <= 2 / 3) {
          computerMove = "Paper";
        } else {
          computerMove = "Scissor";
        }
        return computerMove;
      }

      function playGame(playerMove) {
        const computerMove = pickComputerMove();
        let result = "";

        if (playerMove == "Rock") {
          if (computerMove == "Rock") {
            result = "You tied !";
          } else if (computerMove == "Paper") {
            result = "You Lose !";
          } else if (computerMove == "Scissor") {
            result = "You Win !";
          }
        } else if (playerMove == "Paper") {
          if (computerMove == "Paper") {
            result = "You tied !";
          } else if (computerMove == "Rock") {
            result = "You Win !";
          } else if (computerMove == "Scissor") {
            result = "You Lose !";
          }
        } else if (playerMove == "Scissor") {
          if (computerMove == "Scissor") {
            result = "You tied !";
          } else if (computerMove == "Paper") {
            result = "You Win !";
          } else if (computerMove == "Rock") {
            result = "You Lose !";
          }
        }

        if (result === "You Win !") {
          score.wins += 1;
        } else if (result === "You Lose !") {
          score.losses += 1;
        } else if (result === "You tied !") {
          score.ties += 1;
        }

        localStorage.setItem("score", JSON.stringify(score));

        document.querySelector(".js-score").innerHTML = `Wins : ${score.wins} ,
          Losses : ${score.losses} , Ties : ${score.ties}`;

        document.querySelector(".js-result").innerHTML = result;
        document.querySelector(".js-move").innerHTML =
          `Computer Picked : ${computerMove}`;
      }
      function updateScoreElement() {
        document.querySelector(".js-score").innerHTML = `Wins : ${score.wins} ,
          Losses : ${score.losses} , Ties : ${score.ties}`;
      }
    </script>
  </body>
</html>
