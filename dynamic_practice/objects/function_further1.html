<!DOCTYPE html>
<html>
  <head>
    <title>convert feet</title>
  </head>
  <body>
    
    <script>

function convertMile(length){
          const distance = length/1.6; 
          return distance;
        }

function convertKilo(length){
          const distance = length*1.6; 
          return distance;
        }


      function convertLength(length , from , to){ 

        if(from === 'miles' && to === 'km' ){
        return convertKilo(length) + 'km';
        }
        else if (from === 'km' && to === 'miles' ){
          return convertMile(length)+ 'miles';
        }else{ 
          console.log('invalid input'); 
        }

      }

console.log(convertLength(32, 'km','miles')); 
console.log(convertLength(50,'miles','km'));

    </script>
  </body>
</html>
