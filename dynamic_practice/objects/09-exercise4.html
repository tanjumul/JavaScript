<!DOCTYPE html>
<html>
  <head>
    <title>Ex3</title>
  </head>
  <body>
    <input type="text" class="writes" placeholder="Name" onkeyup="  
      
      if(event.key == 'Enter'){ 
        pass(); 
      }
      
      ">
   
   
   <button class="subs" onclick="

    pass(); 
    ">Submit</button>
    <p class="Para"></p>
    <script>
      onkeydown =  function (event){ 
if(event.key == '/'){ 
  event.preventDefault(); 
  document.querySelector('.writes').focus(); 

}

      }
      
    
function pass(){
  const Elembtn = document.querySelector('.writes');
    document.querySelector('.Para').innerHTML = `Your submitted text is : 
    ${Elembtn.value}`;
}

    </script>
  </body>
</html>
