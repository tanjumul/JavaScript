<!doctype html>
<html>
  <head>
    <title>Rock-paper-scissors-cleaner</title>
  </head>
  <body>
    <button class="rock-btn" onclick="playGame('Rock')">Rock</button>

    <button class="paper-btn" onclick="playGame('Paper')">Paper</button>

    <button class="scissors-btn" onclick="playGame('Scissor')">Scissors</button>

  <button class="reset-scr" onclick="
        score.wins = 0; 
        score.losses = 0;   
        score.ties = 0;
        localStorage.removeItem('score'); 
  ">Reset Score</button>
    <script>

      // const score = { 
      //   wins : 0, 
      //   losses : 0,   
      //   ties : 0
      // }

     

      let score = JSON.parse(localStorage.getItem('score')); 
      
       if(score=== null){
        score ={
          wins : 0, 
          losses : 0, 
          ties: 0
        }
      }
    // console.log(JSON.parse(localStorage.getItem('score')));

      function pickComputerMove() {
        let computerMove = "";
        const randomNumber = Math.random();
        if (randomNumber > 0 && randomNumber <= 1 / 3) {
          computerMove = "Rock";
        } else if (randomNumber >= 1 / 3 && randomNumber <= 2 / 3) {
          computerMove = "Paper";
        } else {
          computerMove = "Scissor";
        }
        return computerMove;
      }

      function playGame(playerMove) {
        const computerMove = pickComputerMove();
        let result = "";

        if (playerMove == "Rock") {
          if (computerMove == "Rock") {
            result = "You tied !";
          } else if (computerMove == "Paper") {
            result = "You Lose !";   
          } else if (computerMove == "Scissor") {
            result = "You Win !";
          }
        } else if (playerMove == "Paper") {
          if (computerMove == "Paper") {
            result = "You tied !";
          } else if (computerMove == "Rock") {
            result = "You Win !";
          } else if (computerMove == "Scissor") {
            result = "You Lose !";   
          }
        } else if (playerMove == "Scissor") {
          if (computerMove == "Scissor") {
            result = "You tied !";
          } else if (computerMove == "Paper") {
            result = "You Win !";
          } else if (computerMove == "Rock") {
            result = "You Lose !";   
          }
        }

        
        if (result === 'You Win !') { 
          score.wins += 1; 
        } else if (result === 'You Lose !') {
          score.losses += 1; 
        } else if (result === 'You tied !') {
          score.ties += 1; 
        }

        alert(`Computer Picked : ${computerMove} and so ${result} 
        Wins : ${score.wins}, Losses : ${score.losses}, Ties : ${score.ties}`);
        
        localStorage.setItem('score', JSON.stringify(score));


      }
    </script>
  </body>
</html>
