<!doctype html>
<html>
  <head>
    <title>Rock-paper-scissors-cleaner</title>
    <style>
       body{ 
        font-family : Arial, Helvetica, sans-serif; 
      }
      .js-YTbutton{ 
        border : 1px; 
        border-style: solid;
        padding-right: 15px;
        padding-left:15px;
        border-radius: 50px;
        color:white;
        padding-top:10px;  
        padding-bottom: 10px;
        background-color: rgb(46, 42, 42);
        font-weight: bold ;
        cursor:pointer; 
        margin-bottom:30px; 

        
      }

      .is-subscribed{ 

        background-color : rgb(240,240,240); 
        color : black; 
        border:none; 

      }

      .cost-input{ 
        padding-left : 10px; 
        padding-top:10px;
        padding-right: 10px;
        padding-bottom:10px; 
        border:1px; 
        border-style: solid;
        font-size:15px; 


       
      }
      .calculate-button{
        padding-top:12px; 
        padding-bottom:12px; 
        padding-left:15px;
        padding-right:15px; 
        font-size:15px; 
        background-color: green;
        color:white; 
        border:none; 


      }

     
    </style>
  </head>
  <body>
    <p>YouTube Subscribe Button</p>
    <button class="js-YTbutton" onclick="
    subscribe();
    
    ">Subscribe</button>
    <p class="js-result"></p>
    <p class="js-move"></p>
    <p class="js-score"></p>

 



<p>Amazon Shipping Calculator</p>
<p>Orders under $40 = +$10 shipping.</p>
<p>Orders over $40 = FREE shipping.</p>

<input type="text" class="js-input cost-input" placeholder="Cost of order" onkeydown="

handlecostKeyDown(event);

"> <button onclick="
calculate();" class="calculate-button">Calculate</button>


<p class="js-input-results"></p>


    <script>
  
  function subscribe (){ 
    const buttonElemnent = document.querySelector('.js-YTbutton') ; 
    if (buttonElemnent.innerHTML === 'Subscribe'){ 
      buttonElemnent.innerHTML = 'Subscribed';
      buttonElemnent.classList.add('is-subscribed'); 
    }
      else{ 
        buttonElemnent.innerHTML = 'Subscribe';
        buttonElemnent.classList.remove('is-subscribed'); 
      }
    }
  
  

  function handlecostKeyDown(event){ 

  if(event.key === 'Enter'){ 
    calculate();   
  }

  }

function calculate(){

const inputElement = document.querySelector('.js-input');

let costs = Number(inputElement.value); 

let finalCosting; 

finalCosting = (costs > 40 ) ? costs : costs + 10; 
document.querySelector('.js-input-results').innerHTML = `$${finalCosting}`;

}



     
    </script>
  </body>
</html>
