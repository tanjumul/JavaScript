  <!doctype html>
  <html>
    <head>
      <title>Rock-paper-scissors-cleaner</title>
  <style>
    body{ 
      background-color: rgba(25,25,25);
      color:white; 
      font-family:arial; 
    }
    .title { 
      font-size: 30px;
      font-weight: bold;

    }
    .move-icon{ 
      height:50px;
      cursor:pointer;
    }
    .move-button{
      background-color: transparent;
      border:3px dashed white; 
      width: 120px;
      height: 120px;
      border-radius:60px;
      margin-right: 10px;
    
    }

    .js-result{
      
      font-size: 25px;
      font-weight: bold;
      margin-top:50px;

    }

    .score{ 
      margin-top:60px; 
    }

    .reset-score-button{ 
      background-color: white;
      border:none; 
      font-size:15px;
    padding: 8px 15px;
    cursor: pointer;
    }

    .programmer {
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
      color:rgba(255, 182, 236, 0.818);
      font-weight: bold;
      margin-top:55px;
      font-size: 30px;
      display: flex;
      justify-content: flex-end;
    }
  </style>

    </head>
    <body>
      <p class="title">Rock Paper & Scissors</p>
      <button class="move-button" onclick="playGame('Rock')"><img class="move-icon" src="./assets/rock-emoji.png" alt=""></button>

      <button class="move-button" onclick="playGame('Paper')">
        <img class="move-icon" src="./assets/paper-emoji.png" alt="">
      </button>

      <button class="move-button" onclick="playGame('Scissors')"><img class="move-icon" src="./assets/scissors-emoji.png" alt=""></button>

  
  <p class="js-result result"></p> 
    
  <p class="js-move"></p>

  <p class="js-score score"></p>


    <button  class="reset-score-button" onclick="
          score.wins = 0; 
          score.losses = 0;   
          score.ties = 0;
          localStorage.removeItem('score'); 
          updateScoreElement(); 
    ">Reset Score</button>

    <div  ><a class="programmer" href="https://github.com/tanjumul">- Tanjumul Alom Siam</a></div>
      <script>

        // const score = { 
        //   wins : 0, 
        //   losses : 0,   
        //   ties : 0
        // }

      

        let score = JSON.parse(localStorage.getItem('score')) || 
        { 
      
          wins : 0, 
          losses : 0, 
          ties: 0

        };


            updateScoreElement(); 
          

        //  if(score=== null){
        //   score ={
        //     wins : 0, 
        //     losses : 0, 
        //     ties: 0
        //   }
        // }
      // console.log(JSON.parse(localStorage.getItem('score')));

        function pickComputerMove() {
          let computerMove = "";
          const randomNumber = Math.random();
          if (randomNumber > 0 && randomNumber <= 1 / 3) {
            computerMove = "Rock";
          } else if (randomNumber >= 1 / 3 && randomNumber <= 2 / 3) {
            computerMove = "Paper";
          } else {
            computerMove = "Scissors";
          }
          return computerMove;
        }

        function playGame(playerMove) {
          const computerMove = pickComputerMove();
          let result = "";

          if (playerMove == "Rock") {
            if (computerMove == "Rock") {
              result = "You tied !";
            } else if (computerMove == "Paper") {
              result = "You Lose !";   
            } else if (computerMove == "Scissors") {
              result = "You Win !";
            }
          } else if (playerMove == "Paper") {
            if (computerMove == "Paper") {
              result = "You tied !";
            } else if (computerMove == "Rock") {
              result = "You Win !";
            } else if (computerMove == "Scissors") {
              result = "You Lose !";   
            }
          } else if (playerMove == "Scissors") {
            if (computerMove == "Scissors") {
              result = "You tied !";
            } else if (computerMove == "Paper") {
              result = "You Win !";
            } else if (computerMove == "Rock") {
              result = "You Lose !";   
            }
          }

          
          if (result === 'You Win !') { 
            score.wins += 1; 
          } else if (result === 'You Lose !') {
            score.losses += 1; 
          } else if (result === 'You tied !') {
            score.ties += 1; 
          }

          localStorage.setItem('score', JSON.stringify(score));

        
        


          document.querySelector('.js-score').innerHTML = `Wins : ${score.wins} ,
            Losses : ${score.losses} , Ties : ${score.ties}`;

          document.querySelector('.js-result').innerHTML = result;


          
          document.querySelector('.js-move').innerHTML = ` You <img src="./assets/${playerMove === 'Scissor'? 'scissors': playerMove.toLowerCase()}-emoji.png" alt="" class="move-icon">

    <img src="./assets/${computerMove.toLowerCase()}-emoji.png" alt="" class="move-icon">
    Computer`; 
          

          
            // document.querySelector('.js-score').innerHTML = `Wins : ${score.wins} ,
            //  Losses : ${score.losses} , Ties : ${score.ties}`;
          

          // alert(`Computer Picked : ${computerMove} and so ${result} 
          // Wins : ${score.wins}, Losses : ${score.losses}, Ties : ${score.ties}`);
          
          
        }
          function updateScoreElement (){ 
          document.querySelector('.js-score').innerHTML = `Wins : ${score.wins} ,
            Losses : ${score.losses} , Ties : ${score.ties}`;
          }
      </script>
    </body>
  </html>
