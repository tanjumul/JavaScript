      function convertTomiles (length){ 
        const distance = length / 1.6 ; 
        const moredistance_Feet = distance * 5280; 
        return {distance, moredistance_Feet};  
      }
        function convertTokm (length){ 
        const distance = length*1.6 ; 
        const moredistance_Feet = distance *3281;
        return {distance, moredistance_Feet}; 
       
      }

      function convertLength(length , from , to , feet){ 

        if (from === 'miles' && to === 'km'){ 
          return convertTokm(length);
        } else if (from === 'km' && to === 'miles'){ 
          return convertTomiles(length); 
        } else { 
          return 'Invalid input'; 
        }


      }
