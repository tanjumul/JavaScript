<!DOCTYPE html>
<html>
  <head>
    <title>Rock-paper-scissors-cleaner</title>
  </head>

    <button class="rock-btn" onclick="
      Playerpick('Rock');
      ">

      <button class="paper-btn" onclick="

        function calculation(){ 
          let compMov = '';
          const computerMove = Math.random();
          if(computerMove > 0 && computerMove <= 1/3){ 
            compMov = 'Rock';
          } else if (computerMove >= 1/3 && computerMove <= 2/3){
            compMov = 'Paper'; 
          } else{ 
           compMov = 'Scissor'
          }
          return compMov ; 
        }


        function Playerpick (pick){ 
        const computerPick = calculation();
        let result = '';
        if(pick == 'Rock') {
        if(computerPick == 'Rock'){
            result = 'You tied !';
        } else if ( computerPick == 'Paper'){ 
          result = 'You loose !';
        }

          result = 'You win !';
        }
        } else if ( pick == 'Paper'){ 
              if(computerPick == 'Paper'){
                result = 'You tied !';
            } else if ( computerPick == 'Rock'){ 
              result = 'You Win !';
            }
            else if (computerPick == 'Scissor') {
              result = 'You Loose !';
            }
        }
        else if( pick == 'Scissor'){
           if(computerPick == 'Scissor'){
            result = 'You tied !';
        } else if ( computerPick == 'Paper'){ 
          result = 'You Win !';
        }
        else if (computerPick == 'Rock') {
          result = 'You Loose !';
        }
        }
     

       alert(`Computer Picked : ${computerPick} and so ${result}`); 
        }


    </script>
  </body>
</html>
